name: Sync Fork with Apache Kafka

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to sync (comma-separated, e.g., trunk,3.9)'
        required: false
        default: 'trunk,3.9'

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/apache/kafka.git || true
          git remote -v

      - name: Determine branches to sync
        id: branches
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCHES="${{ github.event.inputs.branches }}"
          else
            BRANCHES="trunk,3.9"
          fi
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT

      - name: Sync branches
        env:
          BRANCHES: ${{ steps.branches.outputs.branches }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra BRANCH_ARRAY <<< "$BRANCHES"

          for branch in "${BRANCH_ARRAY[@]}"; do
            branch=$(echo "$branch" | xargs)  # trim whitespace
            echo "::group::Syncing branch: $branch"

            # Fetch latest from upstream
            echo "Fetching upstream/$branch..."
            git fetch upstream "$branch" || {
              echo "::error::Failed to fetch upstream/$branch"
              continue
            }

            # Check if branch exists locally
            if git show-ref --verify --quiet "refs/heads/$branch"; then
              echo "Branch $branch exists locally"
              git checkout "$branch"
            elif git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              echo "Branch $branch exists remotely, creating local branch"
              git checkout -b "$branch" "origin/$branch"
            else
              echo "::warning::Branch $branch does not exist, skipping"
              continue
            fi

            # Get current commit before sync
            BEFORE_COMMIT=$(git rev-parse HEAD)
            echo "Current HEAD: $BEFORE_COMMIT"

            # Get upstream commit
            UPSTREAM_COMMIT=$(git rev-parse "upstream/$branch")
            echo "Upstream HEAD: $UPSTREAM_COMMIT"

            # Check if already up to date
            if [ "$BEFORE_COMMIT" = "$UPSTREAM_COMMIT" ]; then
              echo "Branch $branch is already up to date with upstream"
            else
              # Try to merge upstream changes
              echo "Merging upstream/$branch into $branch..."
              if git merge "upstream/$branch" -m "Sync $branch with apache/kafka upstream"; then
                echo "Merge successful"
                AFTER_COMMIT=$(git rev-parse HEAD)

                # Push if there are new commits
                if [ "$BEFORE_COMMIT" != "$AFTER_COMMIT" ]; then
                  echo "Pushing changes to origin/$branch..."
                  git push origin "$branch" || {
                    echo "::error::Failed to push $branch"
                    continue
                  }
                  echo "✅ Successfully synced and pushed $branch"
                else
                  echo "No new commits to push"
                fi
              else
                echo "::error::Merge conflict detected on $branch"
                echo "::error::Manual intervention required to resolve conflicts"
                git merge --abort

                # Create an issue to notify about the conflict and trigger Copilot agent
                echo "Creating notification issue with Copilot Workspace link..."
                
                # Build issue body in a temp file
                {
                  echo "## Merge Conflict Detected - GitHub Copilot Workspace Available"
                  echo ""
                  echo "Automatic fork synchronization encountered a merge conflict on the \`$branch\` branch."
                  echo ""
                  echo "### Context"
                  echo "- **Branch:** \`$branch\`"
                  echo "- **Upstream:** apache/kafka"
                  echo "- **Current HEAD:** \`$BEFORE_COMMIT\`"
                  echo "- **Upstream HEAD:** \`$UPSTREAM_COMMIT\`"
                  echo ""
                  echo "### Resolution Options"
                  echo ""
                  echo "#### Option 1: Use GitHub Copilot Workspace (Recommended)"
                  echo "Click the **\"Open in Workspace\"** button in the Development section on the right side of this issue. Copilot will help you automatically resolve the conflicts."
                  echo ""
                  echo "Steps:"
                  echo "1. Click \"Open in Workspace\" button on this issue"
                  echo "2. Review Copilot's proposed resolution plan"
                  echo "3. Verify BUX-specific patches are preserved"
                  echo "4. Click \"Implement\" to apply changes"
                  echo "5. Review and merge the generated PR"
                  echo ""
                  echo "#### Option 2: Manual Resolution"
                  echo "1. Checkout: \`git checkout $branch\`"
                  echo "2. Merge: \`git merge upstream/$branch\`"
                  echo "3. Resolve conflicts while preserving BUX-specific patches"
                  echo "4. Test and push changes"
                  echo ""
                  echo "### Important Notes"
                  echo "- **Preserve all BUX-specific patches during resolution**"
                  echo "- Test the merged code before pushing"
                  echo "- Close this issue once conflicts are resolved"
                } > "/tmp/merge_conflict_issue_${branch}_$$.md"
                
                # Create issue with copilot-workspace label in the fork repository
                gh issue create \
                  --repo "${{ github.repository }}" \
                  --title "Merge Conflict: Resolve using GitHub Copilot Workspace on $branch" \
                  --label "sync,conflict,copilot-workspace" \
                  --body-file "/tmp/merge_conflict_issue_${branch}_$$.md" \
                  || echo "Failed to create issue"
              fi
            fi

            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          echo "### Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Attempted to sync the following branches:" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra BRANCH_ARRAY <<< "${{ steps.branches.outputs.branches }}"
          for branch in "${BRANCH_ARRAY[@]}"; do
            branch=$(echo "$branch" | xargs)
            echo "- $branch" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for detailed results." >> $GITHUB_STEP_SUMMARY
